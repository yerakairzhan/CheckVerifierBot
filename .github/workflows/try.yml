name: Go CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v3

      # Устанавливаем Go
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.20

      # Устанавливаем зависимости (корневая директория уже настроена)
      - name: Install dependencies
        run: go mod tidy

      # Сборка проекта
      - name: Build project
        run: go build -o bot .

      # Запуск тестов
      - name: Run tests
        run: go test ./...
