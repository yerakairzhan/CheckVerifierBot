name: Go CI/CD

on:
  push:
    branches:
      - main  # Запускается при пуше в ветку main
  pull_request:
    branches:
      - main  # Запускается при создании PR в main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v3

      # Устанавливаем Go (актуальную версию)
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.20

      # Проверяем, что Go установился корректно
      - name: Verify Go version
        run: go version

      # Устанавливаем зависимости
      - name: Install dependencies
        run: go mod tidy

      # Сборка проекта
      - name: Build project
        run: go build -o bot .

      # Запуск тестов
      - name: Run tests
        run: go test ./...
